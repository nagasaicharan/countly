[unix_http_server]
file=/tmp/supervisor.sock
 
[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=warn
pidfile=/var/log/supervisord.pid
nodaemon=false
minfds=1024
minprocs=200
user=root
childlogdir=/var/log/

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[group:userovo]
programs=userovo-dashboard, userovo-api

[program:userovo-dashboard]
environment=NODE_ENV=production
user=userovo
command=node %(here)s/../../frontend/express/app.js
directory=.
autorestart=true
redirect_stderr=true
stdout_logfile=%(here)s/../../log/userovo-dashboard.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=50
stdout_capture_maxbytes=1MB
stdout_events_enabled=false
loglevel=warn

[program:userovo-api]
environment=NODE_ENV=production
user=userovo
command=node %(here)s/../../api/api.js
directory=%(here)s
autorestart=true
redirect_stderr=true
stdout_logfile=%(here)s/../../log/userovo-api.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=50
stdout_capture_maxbytes=1MB
stdout_events_enabled=false
loglevel=warn