apiVersion: v1
kind: Service
metadata:
  name: userovo-ingestion
spec:
  ports:
  - port: 3001
    protocol: TCP
    targetPort: 3001
  selector:
    app: userovo-ingestion
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userovo-ingestion-deployment
spec:
  selector:
    matchLabels:
      app: userovo-ingestion
  replicas: 1
  template:
    metadata:
      labels:
        app: userovo-ingestion
    spec:
      containers:
      - name: userovo-ingestion
        image: userovo/api:23.03
#        image: gcr.io/userovo-01/api:23.03     # Userovo Enterprise
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /o/ping
            port: 3001
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 30
        env:
          - name: USEROVO_PLUGINS
            value: "mobile,web,desktop,plugins,density,locale,browser,sources,views,logger,systemlogs,errorlogs,populator,reports,crashes,push,star-rating,slipping-away-users,compare,server-stats,dbviewer,assistant,times-of-day,compliance-hub,alerts,onboarding,consolidate,remote-config,hooks,dashboards"
            # Userovo Enterprise: value: "mobile,web,desktop,plugins,density,locale,browser,sources,views,license,drill,funnels,retention_segments,flows,cohorts,surveys,remote-config,ab-testing,formulas,activity-map,concurrent_users,revenue,logger,systemlogs,errorlogs,populator,reports,crashes,push,geo,block,restrict,users,star-rating,slipping-away-users,compare,server-stats,assistant,dbviewer,crash_symbolication,groups,white-labeling,alerts,times-of-day,compliance-hub,onboarding,active_users,performance-monitoring,config-transfer,consolidate,data-manager,hooks,dashboards,heatmaps"
          - name: USEROVO_CONFIG_API_FILESTORAGE
            value: "gridfs"
          - name: USEROVO_CONFIG__MONGODB
            value: "mongodb://mongo-mongodb-replicaset-0.mongo-mongodb-replicaset:27017,mongo-mongodb-replicaset-1.mongo-mongodb-replicaset:27017,mongo-mongodb-replicaset-2.mongo-mongodb-replicaset:27017/userovo?replicaSet=rs0"
          - name: USEROVO_CONFIG_HOSTNAME
            value: userovo.example.com
          - name: NODE_OPTIONS
            value: "--max-old-space-size=2048"
          - name: USEROVO_CONFIG_API_API_WORKERS
            value: "4"  # value can be CPU core count
